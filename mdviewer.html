#app { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg); }
/* toolbar */
#toolbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 6px; padding: 0 12px; height: 48px; background: var(--toolbar-bg); border-bottom: 1px solid var(--toolbar-border); flex-shrink: 0; user-select: none; transition: top .25s ease; }
#toolbar.hide { top: -48px; }
.logo { font-weight: 700; font-size: 15px; color: var(--heading); white-space: nowrap; letter-spacing: -.02em; }
#fileName { flex: 1; font-size: 13px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0 6px; text-align: center; min-width: 0; background: transparent; }
.toolbar-group { display: flex; gap: 3px; }
#toolbar button, .btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; font-size: 12.5px; border: 1px solid var(--border); border-radius: 6px; background: var(--btn-bg); color: var(--text); cursor: pointer; white-space: nowrap; transition: background .15s, color .15s; font-family: inherit; line-height: 1.4; }
#toolbar button:hover, .btn:hover { background: var(--btn-hover); }
#toolbar button:active { transform: scale(.97); }
#toolbar button.active { background: var(--btn-primary); color: #fff; border-color: var(--btn-primary); }
#toolbar button { outline: none; }
.github-icon { display:inline-flex; align-items:center; color:var(--text-dim); text-decoration:none; transition:color .15s; }
.github-icon:hover { color:var(--text); }
#toolbar button::-moz-focus-inner { border: 0; }
/* main area */
#main { display: flex; flex: 1; min-height: 0; }
/* sidebar (file list + toc) */
#sidebar { width: 240px; flex-shrink: 0; display: none; flex-direction: column; border-right: 1px solid var(--border); background: var(--toc-bg); overflow: hidden; position: sticky; top: 48px; align-self: flex-start; min-height: 100vh; transition: top .25s ease; }
#sidebar.open { display: flex; }
#sidebar.full { top: 0; }
/* sidebar tabs */
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-tab { flex: 1; padding: 8px 4px; font-size: var(--sidebar-font-size, 12px); font-weight: 500; border: none; background: none; color: var(--text-dim); cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; transition: color .12s, border-color .12s; outline: none; }
.sidebar-tab:hover { color: var(--text); }
.sidebar-tab.active { color: var(--toc-active); border-bottom-color: var(--toc-active); }
/* sidebar panels */
.sidebar-panel { flex: 1; overflow-y: auto; display: none; }
.sidebar-panel.active { display: block; }
/* file tree */
.tree { padding: 4px 0; }
.tree-dir-header, .tree-file { display: flex; align-items: center; width: 100%; padding: 4px 8px 4px 0; font-size: var(--sidebar-font-size, 12.5px); color: var(--toc-text); cursor: pointer; border: none; background: none; text-align: left; font-family: inherit; overflow: hidden; transition: background .12s, color .12s; border-left: 2px solid transparent; }
.tree-dir-header, .tree-file { outline: none; }
.tree-dir-header:hover, .tree-file:hover { background: var(--file-hover); color: var(--toc-hover); }
.tree-file.active { color: var(--toc-active); border-left-color: var(--toc-active); font-weight: 500; background: var(--file-active); }
.tree-arrow { flex-shrink: 0; width: 20px; text-align: center; font-size: 13px; color: var(--text-dim); font-family: monospace; }
.tree-icon { flex-shrink: 0; width: 18px; text-align: center; margin-right: 2px; font-size: 11px; opacity: .3; }
.tree-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-children { overflow: hidden; }
/* toc */
#tocPanel { padding: 4px 0; }
#tocPanel a { display: block; padding: 3px 16px; color: var(--toc-text); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border-left: 2px solid transparent; transition: color .15s, border-color .15s; font-size: var(--sidebar-font-size, 13px); }
#tocPanel a:hover { color: var(--toc-hover); }
#tocPanel a.active { color: var(--toc-active); border-left-color: var(--toc-active); font-weight: 500; }
#tocPanel .toc-h2 { padding-left: 32px; font-size: calc(var(--sidebar-font-size, 13px) - 0.5px); }
#tocPanel .toc-h3 { padding-left: 48px; font-size: calc(var(--sidebar-font-size, 13px) - 1px); }
/* shortcut list */
.shortcut-list { display: flex; flex-direction: column; gap: 4px; }
.shortcut-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; font-size: 13px; }
.shortcut-row .shortcut-btn { background: var(--btn-bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 10px; font-size: 12px; font-family: inherit; color: var(--text); cursor: pointer; min-width: 100px; text-align: center; transition: background .12s; outline: none; font-family: monospace; }
.shortcut-row .shortcut-btn:hover { background: var(--btn-hover); }
.shortcut-row .shortcut-btn.capturing { background: var(--btn-primary); color: #fff; border-color: var(--btn-primary); }
.shortcut-reset { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 11px; padding: 0 4px; text-decoration: underline; font-family: inherit; outline: none; }
.shortcut-reset:hover { color: var(--link); }
/* content */
#content { flex: 1; min-width: 0; padding: 40px 24px; display: flex; justify-content: center; }
#content-inner { max-width: var(--content-width); width: 100%; min-height: 200px; }
/* dropzone */
#dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed var(--dropzone-border); border-radius: 12px; padding: 60px 40px; text-align: center; color: var(--text-dim); transition: border-color .2s, background .2s; cursor: default; margin-top: 40px; }
#dropzone.drag-over { border-color: var(--link); background: var(--blockquote-bg); }
#dropzone svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: .4; color: var(--text-dim); }
#dropzone p { font-size: 15px; margin-bottom: 6px; color: var(--text); }
#dropzone .sub { font-size: 13px; color: var(--text-dim); }
/* ---- Typography ---- */
#content-inner h1, #content-inner h2, #content-inner h3, #content-inner h4, #content-inner h5 { color: var(--heading); font-weight: 600; line-height: 1.35; margin-top: 1.8em; margin-bottom: .5em; }
#content-inner h1 { font-size: 1.85em; padding-bottom: .3em; border-bottom: 1px solid var(--h-border); margin-top: 0; }
#content-inner h2 { font-size: 1.45em; padding-bottom: .25em; border-bottom: 1px solid var(--h-border); }
#content-inner h3 { font-size: 1.2em; }
#content-inner h4 { font-size: 1.05em; }
#content-inner h5 { font-size: .95em; color: var(--text-dim); }
#content-inner p { margin: .75em 0; }
#content-inner a { color: var(--link); text-decoration: none; transition: color .15s; }
#content-inner a:hover { color: var(--link-hover); text-decoration: underline; }
#content-inner blockquote { margin: 1em 0; padding: 12px 16px; border-left: 4px solid var(--blockquote-border); background: var(--blockquote-bg); border-radius: 0 6px 6px 0; }
#content-inner blockquote p { margin: .4em 0; }
#content-inner ul, #content-inner ol { padding-left: 1.6em; margin: .6em 0; }
#content-inner li { margin: .25em 0; }
#content-inner li > p { margin: .3em 0; }
#content-inner hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }
#content-inner img { max-width: 100%; height: auto; border-radius: 6px; display: block; margin: 1em auto; }
#content-inner strong { font-weight: 600; }
#content-inner code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace; font-size: .875em; background: var(--code-bg); color: var(--code-text); padding: 2px 6px; border-radius: 4px; }
#content-inner pre { margin: 1em 0; border-radius: 8px; overflow-x: auto; background: var(--code-bg) !important; border: 1px solid var(--border); }
#content-inner pre code { display: block; padding: 16px 20px; font-size: .85em; line-height: 1.55; background: none !important; }
#content-inner table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: .93em; }
#content-inner th, #content-inner td { padding: 8px 14px; border: 1px solid var(--table-border); text-align: left; }
#content-inner th { background: var(--table-stripe); font-weight: 600; }
#content-inner tr:nth-child(even) { background: var(--table-stripe); }
#content-inner .katex { font-size: 1.05em; color: var(--katex-color); }
#content-inner .katex .accent-body { position: relative; transform: translateY(-0.05em); }
#content-inner .katex .accent-body .overlay { position: absolute; }
#content-inner .katex svg { fill: currentColor; }
#content-inner .katex-display { margin: .8em 0; overflow-x: auto; overflow-y: hidden; padding: 4px 0; }
.math-error { color: #c00; border-bottom: 1px dashed #c00; }
/* heading anchor */
.heading-anchor { opacity: 0; margin-left: -1.2em; padding-right: 4px; font-size: .85em; color: var(--link); text-decoration: none !important; transition: opacity .15s; float: left; }
#content-inner h1:hover .heading-anchor, #content-inner h2:hover .heading-anchor, #content-inner h3:hover .heading-anchor, #content-inner h4:hover .heading-anchor, #content-inner h5:hover .heading-anchor { opacity: .6; }
.heading-anchor:hover { opacity: 1 !important; }
/* Settings overlay */
.overlay { display: none; position: fixed; inset: 0; background: var(--overlay-bg); z-index: 100; justify-content: flex-end; align-items: stretch; }
.overlay.open { display: flex; }
.settings-panel { width: 340px; max-width: 92vw; background: var(--panel-bg); box-shadow: -4px 0 24px var(--panel-shadow); display: flex; flex-direction: column; overflow-y: auto; }
.settings-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.settings-header h2 { font-size: 16px; font-weight: 600; color: var(--heading); margin: 0; border: none; background: none; }
.settings-header button { background: none; border: none; font-size: 22px; color: var(--text-dim); cursor: pointer; padding: 2px 4px; line-height: 1; outline: none; }
.settings-header button:hover { color: var(--text); }
.settings-body { padding: 16px 20px 24px; flex: 1; }
.setting-group { margin-bottom: 18px; }
.setting-group label { display: block; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; color: var(--text-dim); margin-bottom: 6px; }
.setting-group .value { font-size: 12px; color: var(--text-dim); margin-left: 6px; font-weight: 400; text-transform: none; }
.setting-row { display: flex; gap: 5px; flex-wrap: wrap; }
.setting-row .opt-btn { padding: 5px 12px; font-size: 12.5px; border: 1px solid var(--border); border-radius: 6px; background: var(--btn-bg); color: var(--text); cursor: pointer; transition: all .12s; font-family: inherit; }
.setting-row .opt-btn:hover { background: var(--btn-hover); }
.setting-row .opt-btn.active { background: var(--btn-primary); color: #fff; border-color: var(--btn-primary); }
input[type="range"] { width: 100%; margin: 4px 0; accent-color: var(--btn-primary); cursor: pointer; }
/* custom color inputs */
.color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--code-bg); }
.color-item { display: flex; align-items: center; gap: 6px; }
.color-item label { font-size: 11px; color: var(--text-dim); text-transform: none; letter-spacing: 0; margin: 0; flex: 1; }
.color-item input[type="color"] { width: 28px; height: 28px; padding: 0; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: none; }
#urlOverlay { justify-content: center; align-items: center; }
.dialog { background: var(--panel-bg); border-radius: 12px; padding: 24px; width: 480px; max-width: 90vw; box-shadow: 0 8px 32px var(--panel-shadow); }
.dialog h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--heading); border: none; background: none; }
.dialog input[type="url"] { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-family: inherit; outline: none; }
.dialog input[type="url"]:focus { border-color: var(--link); box-shadow: 0 0 0 3px var(--selection); }
.dialog-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.dialog-actions .btn-primary { background: var(--btn-primary); color: #fff; border-color: var(--btn-primary); }
.dialog-actions .btn-primary:hover { background: var(--btn-primary-hover); }
/* scrollbar */
#content::-webkit-scrollbar, .sidebar-section::-webkit-scrollbar, .settings-panel::-webkit-scrollbar { width: 8px; }
#content::-webkit-scrollbar-track, .sidebar-section::-webkit-scrollbar-track, .settings-panel::-webkit-scrollbar-track { background: transparent; }
#content::-webkit-scrollbar-thumb, .sidebar-section::-webkit-scrollbar-thumb, .settings-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
#content::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
/* loading */
#loading { display: none; position: fixed; bottom: 24px; right: 24px; background: var(--panel-bg); padding: 10px 18px; border-radius: 8px; box-shadow: 0 4px 16px var(--panel-shadow); font-size: 13px; color: var(--text); z-index: 50; border: 1px solid var(--border); }
#loading.show { display: flex; align-items: center; gap: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--link); border-radius: 50%; animation: spin .6s linear infinite; }
#sidebar-overlay { display: none; }
/* responsive */
@media (max-width: 768px) {
  #toolbar { padding: 0 6px; gap: 3px; }
  #toolbar button { padding: 5px 7px; font-size: 11.5px; }
  .logo { font-size: 13px; }
  #sidebar { position: fixed; top: 48px; bottom: 0; left: 0; z-index: 90; width: 260px; box-shadow: 4px 0 12px var(--panel-shadow); }
  #content { padding: 24px 16px; }
  #sidebar.open + #sidebar-overlay { display: block; }
}
@media (max-width: 480px) {
  #content { padding: 16px 12px; }
}
/* Android touch: larger hit targets, always-show toolbar, drawer sidebar */
.android #toolbar button, .android .btn { min-height: 44px; padding: 8px 12px; font-size: 13px; }
.android #sidebar { width: 280px; top: 0; z-index: 200; transition: transform .25s ease; transform: translateX(-100%); }
.android #sidebar.open { transform: translateX(0); }
.android #sidebar-overlay { display: none; position: fixed; inset: 0; z-index: 199; background: var(--overlay-bg); }
.android #sidebar.open + #sidebar-overlay { display: block; }
.android #toolbar.hide { top: 0; }
.android #sidebar.full { top: 0; }
/* safe area (Android status bar) */
.android #toolbar { padding-top: calc(0px + env(safe-area-inset-top, 0px)); height: calc(48px + env(safe-area-inset-top, 0px)); }
.android #sidebar { padding-top: env(safe-area-inset-top, 0px); }
/* mobile action sheet */
.mobile-sheet { display: none; }
.android .mobile-sheet { display: block; position: fixed; left: 0; right: 0; bottom: 0; z-index: 300; background: var(--panel-bg); border-top: 1px solid var(--border); box-shadow: 0 -4px 20px var(--panel-shadow); transform: translateY(100%); transition: transform .25s ease; touch-action: pan-x; }
.android .mobile-sheet.open { transform: translateY(0); }
.mobile-sheet-content { padding: 8px 0 max(8px, env(safe-area-inset-bottom, 0px)); }
.mobile-sheet-items { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; padding: 0 8px; }
.mobile-sheet-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 12px 4px; background: none; border: none; color: var(--text); font-size: 11px; cursor: pointer; border-radius: 8px; min-height: 56px; }
.mobile-sheet-btn:active { background: var(--btn-bg); }
.mobile-sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border); margin: 8px auto 0; }
.android #menuBtn { display: inline-flex; }
/* disable pinch-zoom on chrome elements */
#toolbar, #sidebar, .overlay, #sidebar-overlay, #dropzone { touch-action: pan-x pan-y; }
/* print */
@media print {
  #toolbar, #sidebar, .overlay, #loading, #dropzone { display: none !important; }
  #content { padding: 0; }
  #content-inner { max-width: none; }
  body { background: #fff !important; color: #000 !important; }
}
/* hljs overrides */
#content-inner pre code.hljs { background: inherit; }
#content-inner .mermaid { margin: 1em 0; overflow-x: auto; text-align: center; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>

<script>
const $ = (s, ctx) => (ctx || document).querySelector(s);
const $$ = (s, ctx) => Array.from((ctx || document).querySelectorAll(s));

// ---- theme palette definitions ----
const THEMES = {
  light:       { bg:'#fff', text:'#1a1a2e', heading:'#111', link:'#3451b2', codeBg:'#f4f4f8', border:'#e2e2e2' },
  dark:        { bg:'#0f0f23', text:'#d4d4e8', heading:'#eee', link:'#7ba0f0', codeBg:'#1a1a35', border:'#2a2a45' },
  sepia:       { bg:'#faf0e6', text:'#3b3228', heading:'#2a2218', link:'#7a4a2a', codeBg:'#efe4d0', border:'#d8cdbc' },
  nord:        { bg:'#eceff4', text:'#2e3440', heading:'#2e3440', link:'#5e81ac', codeBg:'#e5e9f0', border:'#d8dee9' },
  gruvbox:     { bg:'#fbf1c7', text:'#3c3836', heading:'#1d2021', link:'#98971a', codeBg:'#efe0b0', border:'#d5c4a1' },
  monokai:     { bg:'#272822', text:'#f8f8f2', heading:'#f8f8f2', link:'#a6e22e', codeBg:'#1e1f1c', border:'#3e3d32' },
  solarized:   { bg:'#fdf6e3', text:'#586e75', heading:'#073642', link:'#268bd2', codeBg:'#eee8d5', border:'#eee8d5' },
  'solarized-dark': { bg:'#002b36', text:'#839496', heading:'#eee8d5', link:'#268bd2', codeBg:'#00313d', border:'#073642' }
};

// ---- state ----
const state = {
  fileName: '',
  folderFiles: [],       // Array<{file, name, relPath, fullPath}>
  folderPath: '',        // Tauri: 已打开文件夹的路径
  settings: loadSettings()
};
const isAndroid = /Android/i.test(navigator.userAgent);
const isDesktopTauri = window.__TAURI__ && !isAndroid;

// ---- settings persistence ----
function loadSettings() {
  try { return JSON.parse(localStorage.getItem('mdviewer-settings')) || {}; }
  catch { return {}; }
}
function saveSettings() {
  localStorage.setItem('mdviewer-settings', JSON.stringify(state.settings));
}

// ---- session persistence (last opened file) ----
function saveSession(data) {
  data.sidebarVisible = sidebarVisible;
  const activeTabEl = document.querySelector('.sidebar-tab.active');
  data.activeTab = activeTabEl ? activeTabEl.dataset.panel : 'toc';
  try { localStorage.setItem('mdviewer-session', JSON.stringify(data)); } catch {}
}
function loadSession() {
  try { return JSON.parse(localStorage.getItem('mdviewer-session')) || null; } catch { return null; }
}
function clearSession() {
  try { localStorage.removeItem('mdviewer-session'); } catch {}
}
function restoreSidebarSession(session) {
  if (!session) return;
  if (session.sidebarVisible) {
    sidebarVisible = true;
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarBtn').classList.add('active');
  }
  if (session.activeTab) {
    $$('.sidebar-tab').forEach(b => b.classList.toggle('active', b.dataset.panel === session.activeTab));
    $$('.sidebar-panel').forEach(p => p.classList.toggle('active', p.id.replace('Panel','') === session.activeTab));
  }
}

// ---- keyboard shortcuts ----
const SHORTCUT_ACTIONS = [
  { id: 'openFile', label: '打开文件', default: 'Ctrl+O' },
  { id: 'openFolder', label: '打开文件夹', default: 'Ctrl+Shift+O' },
  { id: 'toggleSidebar', label: '切换侧栏', default: 'Ctrl+B' },
  { id: 'openUrl', label: '打开 URL', default: 'Ctrl+U' },
  { id: 'openSettings', label: '打开选项', default: 'Ctrl+,' },
  { id: 'increaseFontSize', label: '增大字号', default: 'Ctrl+=' },
  { id: 'decreaseFontSize', label: '减小字号', default: 'Ctrl+-' },
  { id: 'closePanels', label: '关闭面板', default: 'Esc' },
];
const DEFAULT_SHORTCUTS = {
  openFile: { key: 'o', ctrl: true, shift: false, meta: false, alt: false },
  openFolder: { key: 'o', ctrl: true, shift: true, meta: false, alt: false },
  toggleSidebar: { key: 'b', ctrl: true, shift: false, meta: false, alt: false },
  openUrl: { key: 'u', ctrl: true, shift: false, meta: false, alt: false },
  openSettings: { key: ',', ctrl: true, shift: false, meta: false, alt: false },
  increaseFontSize: { key: '=', ctrl: true, shift: false, meta: false, alt: false },
  decreaseFontSize: { key: '-', ctrl: true, shift: false, meta: false, alt: false },
  closePanels: { key: 'Escape', ctrl: false, shift: false, meta: false, alt: false },
};
function getShortcuts() {
  return { ...DEFAULT_SHORTCUTS, ...(state.settings.shortcuts || {}) };
}
function shortcutDisplay(s) {
  const parts = [];
  if (s.ctrl) parts.push('Ctrl');
  if (s.meta) parts.push('Cmd');
  if (s.alt) parts.push('Alt');
  if (s.shift) parts.push('Shift');
  const k = s.key === ',' ? ',' : s.key === '-' ? '-' : s.key === '=' ? '=' : s.key === 'Escape' ? 'Esc' : s.key.toUpperCase();
  parts.push(k);
  return parts.join('+');
}
function shortcutMatch(e, s) {
  return e.key.toLowerCase() === s.key.toLowerCase() &&
    e.ctrlKey === !!s.ctrl && e.metaKey === !!s.meta &&
    e.shiftKey === !!s.shift && e.altKey === !!s.alt;
}

// ---- theme application ----
function applySettings() {
  const s = state.settings;
  const root = document.documentElement;

  root.dataset.theme = s.theme || 'light';

  // Custom colors override
  if (s.theme === 'custom' && s.customColors) {
    const c = s.customColors;
    root.style.setProperty('--bg', c.bg || '#fff');
    root.style.setProperty('--text', c.text || '#1a1a2e');
    root.style.setProperty('--heading', c.heading || '#111');
    root.style.setProperty('--link', c.link || '#3451b2');
    root.style.setProperty('--code-bg', c.codeBg || '#f4f4f8');
    root.style.setProperty('--border', c.border || '#e2e2e2');
  }

  const sizes = { narrow: '580px', medium: '720px', wide: '900px', full: '100%' };
  root.style.setProperty('--content-width', sizes[s.contentWidth] || '720px');

  const fonts = {
    sans: `-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif`,
    serif: `'Georgia', 'Noto Serif SC', 'Source Han Serif SC', serif`,
    mono: `'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, 'Noto Sans Mono CJK SC', monospace`
  };
  document.body.style.fontFamily = fonts[s.fontFamily] || fonts.sans;
  document.body.style.fontSize = (s.fontSize || 16) + 'px';
  root.style.setProperty('--lh', s.lineHeight || 1.75);
  const ci = document.getElementById('content-inner');
  if (ci) ci.style.fontSize = (s.contentFontSize || 100) + '%';

// ---- marked configuration ----
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
const linkRenderer = {
  link(token) {
    const { href, title, text, tokens } = token;
    return `<a href="${escHtml(href)}"${title ? ` title="${escHtml(title)}"` : ''} target="_blank" rel="noopener noreferrer">${escHtml(text)}</a>`;
  },
  image(token) {
    const { href, title, text } = token;
    return `<img src="${escHtml(href)}" alt="${escHtml(text || '')}"${title ? ` title="${escHtml(title)}"` : ''} loading="lazy">`;
  }
};
marked.use({ renderer: linkRenderer, gfm: true, breaks: false });

// ---- preprocess math before markdown parsing (handles nesting reliably) ----
function protectMath(md) {
  const blocks = [];
  // Split by fenced code blocks to avoid matching $ inside them
  const parts = md.split(/(```[\s\S]*?```)/);
  const processed = parts.map((part, i) => {
    if (i % 2 === 1) return part; // code block — leave as-is
    let t = part;
    // block math $$...$$ and \[...\]
    t = t.replace(/\$\$([\s\S]+?)\$\$/g, (_, e) => { const id = `\x00M_${blocks.length}\x00`; blocks.push({ d:1, e:e.trim() }); return id; });
    t = t.replace(/\\\[([\s\S]+?)\\\]/g, (_, e) => { const id = `\x00M_${blocks.length}\x00`; blocks.push({ d:1, e:e.trim() }); return id; });
    // inline math $...$ (multiline, but not inside code blocks — already protected above)
    t = t.replace(/\$([\s\S]+?)\$/g, (_, e) => { const id = `\x00M_${blocks.length}\x00`; blocks.push({ d:0, e:e.trim() }); return id; });
    // inline math \(...\)
    t = t.replace(/\\\((.+?)\\\)/g, (_, e) => { const id = `\x00M_${blocks.length}\x00`; blocks.push({ d:0, e:e.trim() }); return id; });
    // protect standalone \cdot and \cdotp used in regular text
    t = t.replace(/\\(?:cdot|cdotp)(?=$|[^\w])/g, () => {
      const id = `\x00M_${blocks.length}\x00`;
      blocks.push({ d:0, e:'\\cdot' });
      return id;
    });
    return t;
  });
  return { text: processed.join(''), blocks };
}

// ---- render pipeline ----
let renderTimeout = null;

function normalizeMathLatex(latex) {
  // Handle \cdot, \cdotp and Unicode · within \text{} by splitting them out
  // E.g., \text{N\cdotm} becomes \text{N}\cdot\text{m}
  // and  \text{kg·m} becomes \text{kg}\cdot\text{m}
  let result = latex;
  
  // Handle LaTeX commands: \cdot and \cdotp
  result = result.replace(/\\text\{([^}]*?)(\\cdot|\\cdotp)([^}]*)\}/g, (match, before, cmd, after) => {
    const cdot = '\\cdot';
    const beforePart = before ? `\\text{${before}}` : '';
    const afterPart = after ? `\\text{${after}}` : '';
    return beforePart + cdot + afterPart;
  });
  
  // Handle Unicode middle dot: · (U+00B7) and · (U+22C5)
  result = result.replace(/\\text\{([^}]*?)(·|\u00B7)([^}]*)\}/g, (match, before, dot, after) => {
    const beforePart = before ? `\\text{${before}}` : '';
    const afterPart = after ? `\\text{${after}}` : '';
    return beforePart + '\\cdot' + afterPart;
  });
  
  // Replace remaining standalone \cdot and \cdotp with ·
  result = result
    .replace(/\\cdotp/g, '·')
    .replace(/\\cdot/g, '·')
    .replace(/\u00B7/g, '·');
    
  return result;
}

function render(markdown, name) {
  const contentBody = document.getElementById('content-body');
  const dropzone = document.getElementById('dropzone');
  const loading = document.getElementById('loading');

  if (renderTimeout) { clearTimeout(renderTimeout); renderTimeout = null; }

  if (!markdown) {
    contentBody.innerHTML = '';
    dropzone.style.display = '';
    document.getElementById('fileName').textContent = '';
    rebuildToc([]);
    return;
  }

  loading.classList.add('show');
  renderTimeout = setTimeout(() => {
    renderTimeout = null;
    try {
      dropzone.style.display = 'none';
      const { text, blocks } = protectMath(markdown);
      let html = marked.parse(text);
      html = html.replace(/\x00M_(\d+)\x00/g, (_, idx) => {
        const b = blocks[+idx];
        if (!b) return '';
        try {
          const latex = normalizeMathLatex(b.e);
          return katex.renderToString(latex, {
            displayMode: !!b.d,
            throwOnError: false,
            macros: { '\\cdotp': '\\cdot' }
          });
        }
        catch { return b.d ? `<div class="math-error">${b.e}</div>` : `<span class="math-error">${b.e}</span>`; }
      });
      contentBody.innerHTML = html;
      document.getElementById('fileName').textContent = name || '';

      contentBody.querySelectorAll('pre code').forEach(block => {
        if (block.classList.contains('language-mermaid')) return;
        hljs.highlightElement(block);
      });

      if (typeof mermaid !== 'undefined') {
        contentBody.querySelectorAll('pre code.language-mermaid').forEach(block => {
          const code = block.textContent;
          const pre = block.parentElement;
          const div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = code;
          pre.parentElement.replaceChild(div, pre);
        });
        try { mermaid.run({ querySelector: '.mermaid' }); } catch (e) { console.warn('mermaid error:', e); }
      }

      addHeadingAnchors();
      rebuildToc(headingsList());
      if (window.location.hash) {
        const target = document.getElementById(window.location.hash.slice(1));
        if (target) setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
      }
    } catch (e) {
      contentBody.innerHTML = `<div style="color:#c00;padding:40px;text-align:center">渲染错误: ${e.message}</div>`;
    }
    loading.classList.remove('show');
  }, 50);
}

function addHeadingAnchors() {
  const ci = document.getElementById('content-body');
  const slugs = new Set();
  ci.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
    let text = h.textContent.trim();
    let slug = text.toLowerCase().replace(/[^\w\u4e00-\u9fa5]+/g, '-').replace(/^-+|-+$/g, '') || 'heading';
    if (slugs.has(slug)) { let i = 2; while (slugs.has(slug + '-' + i)) i++; slug += '-' + i; }
    slugs.add(slug);
    h.id = slug;
    h.dataset.headingText = text;
    const a = document.createElement('a');
    a.className = 'heading-anchor'; a.href = '#' + slug; a.textContent = '#';
    h.insertBefore(a, h.firstChild);
  });
}

function headingsList() {
  return Array.from(document.getElementById('content-body').querySelectorAll('h1, h2, h3'));
}

let tocObserver = null;
function rebuildToc(headings) {
  const panel = document.getElementById('tocPanel');
  panel.innerHTML = '';
  if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }
  if (!headings.length) return;
  headings.forEach(h => {
    if (!h.id) return;
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.dataset.headingText || h.textContent.trim();
    a.className = 'toc-' + h.tagName.toLowerCase();
    a.addEventListener('click', e => {
      e.preventDefault();
      const target = document.getElementById(h.id);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    panel.appendChild(a);
  });
  tocObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        panel.querySelectorAll('a').forEach(a => a.classList.remove('active'));
        const active = panel.querySelector(`a[href="#${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { threshold: 0 });
  headings.forEach(h => tocObserver.observe(h));
}

// ---- file loading ----
let fileLoadSeq = 0;

function loadFile(file) {
  if (!file || !file.name.match(/\.(md|markdown|mdown)$/i)) {
    alert('请选择 .md 文件');
    return;
  }
  const seq = ++fileLoadSeq;
  const reader = new FileReader();
  reader.onload = e => {
    if (seq === fileLoadSeq) {
      render(e.target.result, file.name);
      saveSession(loadSession() || {});
    }
  };
  reader.readAsText(file);
}

// ---- folder support (tree) ----
function readDirRecursive(entry, basePath, isRoot) {
  return new Promise((resolve, reject) => {
    if (entry.isFile) {
      entry.file(f => {
        const relPath = basePath ? basePath + '/' + entry.name : entry.name;
        resolve([{ file: f, relPath }]);
      }, err => reject(err));
      return;
    }
    const reader = entry.createReader();
    const all = [];
    function readBatch() {
      reader.readEntries(entries => {
        if (entries.length) { all.push(...entries); readBatch(); return; }
        const prefix = isRoot ? '' : (basePath ? basePath + '/' + entry.name : entry.name);
        Promise.all(all.map(e => readDirRecursive(e, prefix, false))).then(r => resolve(r.flat()), reject);
      }, err => reject(err));
    }
    readBatch();
  });
}

function loadFolder(files, folderPath) {
  const mdFiles = [];
  for (const f of files) {
    const file = f.file || f;
    const name = f.name || file.name;
    const relPath = f.relPath || f.rel_path || (f.file && (f.file.webkitRelativePath || f.file.name)) || file.webkitRelativePath || file.name || name;
    if (name && name.match(/\.(md|markdown|mdown)$/i)) {
      const entry = { name, relPath };
      if (f.fullPath) entry.fullPath = f.fullPath;
      else if (f.full_path) entry.fullPath = f.full_path;
      else if (file && !f.file) entry.file = file;
      else if (f.file) entry.file = f.file;
      mdFiles.push(entry);
    }
  }
  if (!mdFiles.length) { alert('文件夹中未找到 .md 文件'); return; }

  mdFiles.sort((a, b) => a.relPath.localeCompare(b.relPath));
  state.folderFiles = mdFiles;
  state.folderPath = folderPath || '';

  document.getElementById('noFolderMsg').style.display = 'none';
  renderFileTree();

  if (!sidebarVisible) toggleSidebar();
  switchSidebarTab('files');

  loadFolderFileByRel(state.folderFiles[0].relPath);
  if (isDesktopTauri && folderPath) {
    saveSession({ type: 'tauri', folderPath, activeRelPath: state.folderFiles[0].relPath });
  } else {
    saveSession(loadSession() || {});
  }
}

function renderFileTree() {
  const container = document.getElementById('fileTree');
  container.style.display = '';
  container.innerHTML = '';
  const root = { children: {}, files: [] };
  for (const item of state.folderFiles) {
    const parts = item.relPath.split('/');
    let node = root;
    for (let i = 0; i < parts.length - 1; i++) {
      if (!node.children[parts[i]]) node.children[parts[i]] = { children: {}, files: [] };
      node = node.children[parts[i]];
    }
    node.files.push(item);
  }
  renderTreeNode(root, container, 0);
}

function renderTreeNode(node, parentEl, depth) {
  const dirNames = Object.keys(node.children).sort();
  const sortedFiles = [...node.files].sort((a, b) => a.name.localeCompare(b.name));

  for (const name of dirNames) {
    const dir = node.children[name];
    const row = document.createElement('div');
    const header = document.createElement('button');
    header.className = 'tree-dir-header';
    header.style.paddingLeft = (depth * 16 + 8) + 'px';
    const arrow = document.createElement('span');
    arrow.className = 'tree-arrow';
    arrow.textContent = '+';
    const label = document.createElement('span');
    label.className = 'tree-label';
    label.textContent = name;
    header.append(arrow, label);
    row.appendChild(header);

    const childWrap = document.createElement('div');
    childWrap.className = 'tree-children';
    childWrap.style.display = 'none';

    header.addEventListener('click', () => {
      const isOpen = childWrap.style.display !== 'none';
      childWrap.style.display = isOpen ? 'none' : '';
      arrow.textContent = isOpen ? '+' : '-';
    });

    renderTreeNode(dir, childWrap, depth + 1);
    row.appendChild(childWrap);
    parentEl.appendChild(row);
  }

  for (const item of sortedFiles) {
    const btn = document.createElement('button');
    btn.className = 'tree-file';
    btn.style.paddingLeft = (depth * 16 + 28) + 'px';
    btn.dataset.rel = item.relPath;
    btn.innerHTML = `<span class="tree-label">${item.name}</span>`;
    if (item.relPath === activeRelPath) btn.classList.add('active');
    btn.addEventListener('click', () => loadFolderFileByRel(item.relPath));
    parentEl.appendChild(btn);
  }
}

let activeRelPath = '';
let loadSeq = 0;

function loadFolderFileByRel(relPath) {
  const idx = state.folderFiles.findIndex(f => f.relPath === relPath);
  if (idx === -1) return;
  activeRelPath = relPath;
  const item = state.folderFiles[idx];

  document.querySelectorAll('#fileTree .tree-file').forEach(el => {
    el.classList.toggle('active', el.dataset.rel === relPath);
  });

  if ((item.fullPath || item.full_path) && isDesktopTauri) {
    const seq = ++loadSeq;
    window.__TAURI__.core.invoke('read_file', { path: item.fullPath || item.full_path }).then(data => {
      if (seq !== loadSeq) return;
      if (data) render(data.content, item.relPath);
    }).catch(() => {});
  } else if (item.file) {
    const seq = ++loadSeq;
    const reader = new FileReader();
    reader.onload = e => {
      if (seq !== loadSeq) return;
      render(e.target.result, item.relPath);
    };
    reader.readAsText(item.file);
  }

  if (isDesktopTauri && state.folderPath) {
    saveSession({ type: 'tauri', folderPath: state.folderPath, activeRelPath: relPath });
  } else {
    saveSession(loadSession() || {});
  }
}

// ---- sidebar tabs ----
function switchSidebarTab(tab) {
  $$('.sidebar-tab').forEach(b => b.classList.toggle('active', b.dataset.panel === tab));
  $$('.sidebar-panel').forEach(p => p.classList.toggle('active', p.id.replace('Panel','') === tab));
  saveSession(loadSession() || {});
}

// ---- url fetch ----
let urlLoadSeq = 0;

function fetchUrl(url) {
  if (!url) return;
  // GitHub blob → raw.githubusercontent.com
  url = url.replace(/^https?:\/\/(?:www\.)?github\.com\/([^/]+\/[^/]+)\/blob\//i, 'https://raw.githubusercontent.com/$1/');
  const seq = ++urlLoadSeq;
  document.getElementById('loading').classList.add('show');
  fetch(url)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(text => { if (seq !== urlLoadSeq) return; let name = (url.split('/').pop() || url).split('?')[0].split('#')[0]; try { name = decodeURIComponent(name); } catch {} render(text, name); closeUrl(); saveSession({ type: 'url', url, name }); })
    .catch(e => { if (seq === urlLoadSeq) alert('获取失败: ' + e.message); })
    .finally(() => { if (seq === urlLoadSeq) document.getElementById('loading').classList.remove('show'); });
}

// ---- font size adjustment ----
function adjustFontSize(delta) {
  const s = state.settings;
  const current = s.fontSize || 16;
  const max = +(document.getElementById('fontSizeRange').max || 48);
  const min = +(document.getElementById('fontSizeRange').min || 12);
  const next = Math.max(min, Math.min(max, current + delta));
  if (next !== current) { s.fontSize = next; saveSettings(); applySettings(); }
}

let capturingShortcut = null;

// ---- sidebar toggle ----
let sidebarVisible = false;
function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  document.getElementById('sidebar').classList.toggle('open', sidebarVisible);
  document.getElementById('sidebarBtn').classList.toggle('active', sidebarVisible);
  saveSession(loadSession() || {});
}

// ---- settings panel ----
function openSettings() { document.getElementById('settingsOverlay').classList.add('open'); }
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); capturingShortcut = null; }
function openUrl() {
  document.getElementById('urlOverlay').classList.add('open');
  document.getElementById('urlInput').value = '';
  setTimeout(() => document.getElementById('urlInput').focus(), 100);
}
function closeUrl() { document.getElementById('urlOverlay').classList.remove('open'); }

// ---- event binding ----
function init() {
  // File open
  document.getElementById('openBtn').addEventListener('click', async () => {
    if (isDesktopTauri) {
      const path = await window.__TAURI__.dialog.open({
        filters: [{ name: 'Markdown', extensions: ['md', 'markdown', 'mdown'] }]
      });
      if (path) {
        const data = await window.__TAURI__.core.invoke('read_file', { path });
        if (data) { render(data.content, data.name); saveSession({ type: 'tauri', name: data.name, path }); }
      }
    } else {
      document.getElementById('fileInput').click();
    }
  });
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
    e.target.value = '';
  });

  // Folder open
  document.getElementById('folderBtn').addEventListener('click', async () => {
    if (isDesktopTauri) {
      const folderPath = await window.__TAURI__.dialog.open({ directory: true });
      if (folderPath) {
        const fd = await window.__TAURI__.core.invoke('scan_folder', { path: folderPath });
        loadFolder(fd.files, folderPath);
      }
    } else {
      document.getElementById('folderInput').click();
    }
  });
  document.getElementById('folderInput').addEventListener('change', e => {
    if (e.target.files.length) loadFolder(e.target.files);
    e.target.value = '';
  });

  // Drag and drop (binding only to outer element, one listener only)
  const dropzoneEl = document.getElementById('dropzone');
  const content = document.getElementById('content');
  let dragCounter = 0;
  content.addEventListener('dragenter', e => {
    e.preventDefault();
    if (++dragCounter === 1) dropzoneEl.classList.add('drag-over');
  });
  content.addEventListener('dragleave', e => {
    e.preventDefault();
    if (--dragCounter === 0) dropzoneEl.classList.remove('drag-over');
  });
  content.addEventListener('dragover', e => e.preventDefault());
  content.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    dropzoneEl.classList.remove('drag-over');
    const dt = e.dataTransfer;
    const droppedFiles = Array.from(dt.files);
    const entry = dt.items && dt.items[0] && dt.items[0].webkitGetAsEntry && dt.items[0].webkitGetAsEntry();
    if (entry && entry.isDirectory) {
      readDirRecursive(entry, '', true).then(files => {
        if (files.length) loadFolder(files);
      }).catch(() => {
        if (droppedFiles.length) loadFolder(droppedFiles);
      });
    } else {
      const file = droppedFiles[0];
      if (file) {
        loadFile(file);
        // WebView2 可能提供非标准的 file.path
        if (isDesktopTauri && file.path && file.name.match(/\.(md|markdown|mdown)$/i)) {
          saveSession({ type: 'tauri', name: file.name, path: file.path });
        }
      }
    }
  });

  // URL
  document.getElementById('urlBtn').addEventListener('click', openUrl);
  document.getElementById('closeUrlBtn').addEventListener('click', closeUrl);
  document.getElementById('urlFetchBtn').addEventListener('click', () => fetchUrl(document.getElementById('urlInput').value.trim()));
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchUrl(e.target.value.trim());
    if (e.key === 'Escape') closeUrl();
  });

  // Sidebar toggle
  document.getElementById('sidebarBtn').addEventListener('click', toggleSidebar);
  // Sidebar tabs
  $$('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => switchSidebarTab(tab.dataset.panel));
  });

  // Settings
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  document.getElementById('closeSettingsBtn').addEventListener('click', closeSettings);
  document.getElementById('settingsOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });
  document.getElementById('urlOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeUrl(); });

  // Theme buttons
  $$('#themeGroup .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.settings.theme = btn.dataset.value;
      if (btn.dataset.value !== 'custom') delete state.settings.customColors;
      saveSettings();
      applySettings();
    });
  });

  // Custom color inputs
  ['cBg','cText','cHeading','cLink','cCodeBg','cBorder'].forEach(id => {
    document.getElementById(id).addEventListener('input', e => {
      if (!state.settings.customColors) state.settings.customColors = {};
      const map = { cBg:'bg', cText:'text', cHeading:'heading', cLink:'link', cCodeBg:'codeBg', cBorder:'border' };
      state.settings.customColors[map[id]] = e.target.value;
      saveSettings();
      applySettings();
    });
  });

  $$('#codeThemeGroup .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.settings.codeTheme = btn.dataset.value; saveSettings(); applySettings(); });
  });
  $$('#fontFamilyGroup .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.settings.fontFamily = btn.dataset.value; saveSettings(); applySettings(); });
  });
  $$('#widthGroup .opt-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.settings.contentWidth = btn.dataset.value; saveSettings(); applySettings(); });
  });

  // Always show toolbar checkbox
  document.getElementById('alwaysToolbarCb').addEventListener('change', e => {
    state.settings.alwaysShowToolbar = e.target.checked;
    if (e.target.checked) {
      document.getElementById('toolbar').classList.remove('hide');
      document.getElementById('sidebar').classList.remove('full');
    }
    saveSettings();
  });

  // Sliders
  document.getElementById('fontSizeRange').addEventListener('input', e => {
    state.settings.fontSize = +e.target.value; saveSettings(); applySettings();
  });
  document.getElementById('lineHeightRange').addEventListener('input', e => {
    state.settings.lineHeight = +e.target.value; saveSettings(); applySettings();
  });
  document.getElementById('sidebarFontSizeRange').addEventListener('input', e => {
    state.settings.sidebarFontSize = +e.target.value; saveSettings(); applySettings();
  });

  // Swap tabs checkbox
  document.getElementById('swapTabsCb').addEventListener('change', e => {
    state.settings.swapSidebarTabs = e.target.checked; saveSettings(); applySettings();
  });

  // Scroll: hide toolbar on down, show on up (desktop only)
  let lastScrollY = 0;
  window.addEventListener('scroll', () => {
    if (window.innerWidth <= 768) return;
    if (state.settings.alwaysShowToolbar) return;
    const sy = window.scrollY;
    if (sy > lastScrollY && sy > 48) {
      document.getElementById('toolbar').classList.add('hide');
      document.getElementById('sidebar').classList.add('full');
    } else if (sy < lastScrollY) {
      document.getElementById('toolbar').classList.remove('hide');
      document.getElementById('sidebar').classList.remove('full');
    }
    lastScrollY = sy;
  }, { passive: true });

  // Keyboard shortcuts (configurable via settings)
  document.addEventListener('keydown', e => {
    // If capturing a shortcut in settings, handle that first
    if (capturingShortcut) {
      e.preventDefault();
      if (e.key === 'Escape') { capturingShortcut = null; renderShortcutList(); return; }
if (e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' || e.key === 'Meta') return;
          const cap = capturingShortcut;
          const newS = { key: e.key, ctrl: e.ctrlKey, shift: e.shiftKey, meta: e.metaKey, alt: e.altKey };
          const defS = DEFAULT_SHORTCUTS[cap];
          const isDefault = defS && Object.keys(defS).every(k => defS[k] === newS[k]);
          capturingShortcut = null;
          if (isDefault) {
            if (state.settings.shortcuts) delete state.settings.shortcuts[cap];
          } else {
            if (!state.settings.shortcuts) state.settings.shortcuts = {};
            state.settings.shortcuts[cap] = newS;
          }
          saveSettings();
          renderShortcutList();
          return;
    }
    const shortcuts = getShortcuts();
    for (const [action, s] of Object.entries(shortcuts)) {
      if (shortcutMatch(e, s)) {
        e.preventDefault();
        switch (action) {
          case 'openFile': isDesktopTauri ? document.getElementById('openBtn').click() : document.getElementById('fileInput').click(); break;
          case 'openFolder': isDesktopTauri ? document.getElementById('folderBtn').click() : document.getElementById('folderInput').click(); break;
          case 'toggleSidebar': toggleSidebar(); break;
          case 'openUrl': openUrl(); break;
          case 'openSettings': openSettings(); break;
          case 'increaseFontSize': adjustFontSize(1); break;
          case 'decreaseFontSize': adjustFontSize(-1); break;
          case 'closePanels': closeSettings(); closeUrl(); break;
        }
        return;
      }
    }
  });

  // Android: 固定顶栏 + 侧栏 Drawer 遮罩 + 二级菜单
  if (isAndroid) {
    document.documentElement.classList.add('android');
    state.settings.alwaysShowToolbar = true;
    const overlay = document.createElement('div');
    overlay.id = 'sidebar-overlay';
    document.getElementById('sidebar').after(overlay);
    overlay.addEventListener('click', () => { if (sidebarVisible) toggleSidebar(); });

    // Hide secondary toolbar buttons, show menu button
    document.getElementById('urlBtn').style.display = 'none';
    document.getElementById('settingsBtn').style.display = 'none';
    document.querySelector('.github-icon').style.display = 'none';
    document.getElementById('menuBtn').style.display = '';

    // Mobile action sheet
    const mobileSheet = document.getElementById('mobileSheet');
    document.getElementById('menuBtn').addEventListener('click', () => mobileSheet.classList.toggle('open'));
    mobileSheet.querySelectorAll('.mobile-sheet-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        mobileSheet.classList.remove('open');
        const action = btn.dataset.action;
        if (action === 'url') openUrl();
        else if (action === 'sidebar') toggleSidebar();
        else if (action === 'settings') openSettings();
        else if (action === 'github') { if (window.__TAURI__) window.__TAURI__.opener.openUrl('https://github.com/Tonyjh07/mdviewer'); else window.open('https://github.com/Tonyjh07/mdviewer', '_blank'); }
      });
    });
    // Close sheet on content tap
    document.getElementById('content').addEventListener('click', () => {
      if (mobileSheet.classList.contains('open')) mobileSheet.classList.remove('open');
    });
    // Close sheet on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && mobileSheet.classList.contains('open')) mobileSheet.classList.remove('open');
    });
  }

  applySettings();
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({ startOnLoad: false });
  }

  // Font-size based zoom for content only
  const contentInner = document.getElementById('content-inner');
  let pinchDist = 0, pinchFs = 100, lastTap = 0;
  contentInner.addEventListener('touchstart', e => {
    if (e.touches.length === 2) { pinchDist = dist(e.touches); pinchFs = state.settings.contentFontSize || 100; }
  }, { passive: true });
  contentInner.addEventListener('touchmove', e => {
    if (e.touches.length !== 2) return;
    e.preventDefault();
    const zoom = Math.round(Math.min(300, Math.max(50, pinchFs * (dist(e.touches) / pinchDist))));
    state.settings.contentFontSize = zoom;
    contentInner.style.fontSize = zoom + '%';
    saveSettings();
    applyZoomBtn();
  }, { passive: false });
  contentInner.addEventListener('touchend', e => {
    if (e.changedTouches.length === 1 && e.changedTouches[0].screenX < 60) return;
    if (e.touches.length) return;
    const now = Date.now();
    if (now - lastTap < 300 && (state.settings.contentFontSize || 100) !== 100) { resetZoom(); }
    lastTap = now;
  });
  function dist(t) { return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY); }
  function resetZoom() { state.settings.contentFontSize = 100; contentInner.style.fontSize = ''; saveSettings(); applyZoomBtn(); }
  function applyZoomBtn() {
    const fs = state.settings.contentFontSize || 100;
    zoomResetBtn.textContent = fs + '%';
    zoomResetBtn.style.display = fs === 100 ? 'none' : '';
  }
  const zoomResetBtn = document.createElement('button');
  zoomResetBtn.id = 'zoomResetBtn';
  Object.assign(zoomResetBtn.style, { position:'fixed', bottom:'16px', right:'16px', zIndex:'999', padding:'6px 12px', fontSize:'13px', border:'1px solid var(--border)', borderRadius:'20px', background:'var(--toolbar-bg)', color:'var(--text)', cursor:'pointer', display:'none', boxShadow:'0 2px 8px var(--panel-shadow)' });
  zoomResetBtn.addEventListener('click', resetZoom);
  document.body.appendChild(zoomResetBtn);

  // Service Worker for offline caching
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // External links (works on all Tauri platforms, including Android)
  if (window.__TAURI__) {
    document.getElementById('content-body').addEventListener('click', e => {
      const link = e.target.closest('a');
      if (link && link.href && /^https?:\/\//i.test(link.href)) {
        e.preventDefault();
        window.__TAURI__.opener.openUrl(link.href);
      }
    });
  }

  // Desktop Tauri: drag-drop, native session restore, CLI arg
  if (isDesktopTauri) {
    async function handleTauriDrop(paths) {
      const mdPaths = paths.filter(p => /\.(md|markdown|mdown)$/i.test(p));
      if (paths.length === 1 && mdPaths.length === 0) {
        try {
          const isDir = await window.__TAURI__.core.invoke('is_dir', { path: paths[0] });
          if (isDir) {
            const fd = await window.__TAURI__.core.invoke('scan_folder', { path: paths[0] });
            if (fd.files && fd.files.length) { loadFolder(fd.files, paths[0]); return; }
          }
        } catch {}
      }
      if (mdPaths.length) {
        try {
          const data = await window.__TAURI__.core.invoke('read_file', { path: mdPaths[0] });
          if (data) { render(data.content, data.name); saveSession({ type: 'tauri', name: data.name, path: mdPaths[0] }); }
        } catch {}
      }
    }
    try {
      const { getCurrentWebview } = window.__TAURI__.webview;
      if (getCurrentWebview) {
        getCurrentWebview().onDragDropEvent((event) => {
          const p = event.payload;
          const dz = document.getElementById('dropzone');
          if (p.type === 'over') { dz.classList.add('drag-over'); return; }
          if (p.type === 'leave') { dz.classList.remove('drag-over'); return; }
          if (p.type !== 'drop') return;
          dz.classList.remove('drag-over');
          const paths = p.paths;
          if (!paths || !paths.length) return;
          handleTauriDrop(paths);
        }).catch(() => {});
      }
    } catch (_e) {}
    async function restoreTauriSession() {
      const session = loadSession();
      restoreSidebarSession(session);
      if (session && session.type === 'tauri') {
        if (session.path) {
          try {
            const d = await window.__TAURI__.core.invoke('read_file', { path: session.path });
            if (d) { render(d.content, d.name); saveSession({ type: 'tauri', name: d.name, path: d.path }); }
          } catch { clearSession(); }
        } else if (session.folderPath) {
          try {
            const fd = await window.__TAURI__.core.invoke('scan_folder', { path: session.folderPath });
            if (fd.files && fd.files.length) {
              loadFolder(fd.files, session.folderPath);
              if (session.activeRelPath && fd.files.some(f => (f.rel_path) === session.activeRelPath)) {
                loadFolderFileByRel(session.activeRelPath);
              }
            }
          } catch { clearSession(); }
        }
      }
    }
    window.__TAURI__.core.invoke('get_initial_file').then(data => {
      if (data) {
        render(data.content, data.name);
        saveSession({ type: 'tauri', name: data.name, path: data.path });
      } else {
        restoreTauriSession();
      }
    }).catch(() => restoreTauriSession());
  } else {
    const session = loadSession();
    restoreSidebarSession(session);
    if (session && session.type === 'url') {
      fetchUrl(session.url);
    }
  }
  // URL query parameter: ?url=... (优先级高于会话)
  const qUrl = new URLSearchParams(location.search).get('url');
  if (qUrl) setTimeout(() => fetchUrl(qUrl), 0);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
